app = "ccc-chat"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 3337
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[mounts]
  source = "ccc_data"
  destination = "/data"

[[services.tcp_checks]]
  grace_period = "5s"
  interval = "15s"
  timeout = "2s"

[env]
  CCC_PORT = "3337"
  CCC_HOST = "0.0.0.0"
  CCC_DB_PATH = "/data/server.db"
